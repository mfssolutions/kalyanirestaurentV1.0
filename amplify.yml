# AWS Amplify Deployment Configuration
# Learn more at: https://docs.aws.amazon.com/amplify/latest/userguide/build-settings.html
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --legacy-peer-deps || npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
